# Mirror spec: pycowsay-musl — the alpine/musl container test leg (goal
# finalization item 2, "alpine leg validates the musl variant end-to-end").
#
# Reuses the pycowsay PEP 751 lock (source.package: pycowsay) — the pure-python
# py3-none-any wheel runs under any libc — but the env's private interpreter is
# the musl-libc CPython at dev.ocx.sh/ocx/cpython-musl, selected via the default
# variant's `libc: musl` + per-variant `interpreter_package` override. A fresh
# target repo (distinct from `pycowsay`) so discover schedules real work; the
# alpine container leg composes + runs the env under musl end-to-end.
name: pycowsay-musl
target:
  registry: dev.ocx.sh
  repository: ocx/pycowsay-musl

source:
  type: pylock
  path: pycowsay.pylock.toml
  package: pycowsay

python:
  version: "3.14.6"
  abi: cp314
  interpreter_package: "ocx.sh/cpython:3.14.6"

variants:
  - default: true
    libc: musl
    min_musllinux: "1_2"
    interpreter_package: "dev.ocx.sh/ocx/cpython-musl:3.14.6"

tests:
  - name: smoke
    script: tests/pycowsay.smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
    containers:
      - image: alpine:3.20
        id: alpine
