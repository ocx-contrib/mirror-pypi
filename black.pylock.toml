# PEP 751 lock for black, generated via:
#   uv pip compile black --python-version 3.14.6 --format pylock.toml
# black is mypyc-compiled: the cp314 manylinux_2_28 wheel (not the py3-none-any
# fallback) is selected for the 3.14.6/cp314 target, exercising the compiled-
# extension path. Plain `black` (no [d]/[jupyter] extras) → blackd is not
# synthesized. requires-python relaxed from uv's ">=3.14.6" (uv#15995: inherits
# the compiling interpreter's exact patch) to the minor floor so marker eval
# isn't over-narrow against other 3.14.x interpreters.
lock-version = "1.0"
created-by = "uv"
requires-python = ">=3.14"

