# Mirror spec: pycowsay — live pypi pilot (python-mirror-v2 wheels: surface).
# Index-discovered (no committed lock), universal lock. One package, bare
# tags: per-platform wheel selection is declared in the `wheels:` map — the
# plain `linux/amd64` key (default filter ["any"]) publishes a featureless
# entry that runs on glibc AND musl hosts because its interpreter's index
# carries PER-LIBC linux entries (`+libc.glibc`/`+libc.musl` os.features;
# ocx >= 0.4.2 selects by host libc via can_run) plus darwin/windows — one
# interpreter_package reference serves every wheels key. The linux leg
# proves both libcs via debian:12 (glibc) + alpine:3.20 (musl) containers;
# darwin/windows run the same starlark smoke test natively.
name: pycowsay
target:
  registry: dev.ocx.sh
  repository: ocx/pycowsay

source:
  type: pypi
  package: pycowsay

python:
  version: "3.14.6"
  abi: cp314
  interpreter_package: "dev.ocx.sh/ocx/cpython:3.14.6"
  lock:
    universal: true

wheels:
  linux/amd64:
  darwin/arm64:
  windows/amd64:

tests:
  - name: smoke
    script: tests/pycowsay.smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
    containers:
      - image: debian:12
      - image: alpine:3.20
  darwin/arm64:
    runner: macos-latest
  windows/amd64:
    runner: windows-latest
