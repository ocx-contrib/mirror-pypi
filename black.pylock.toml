# PEP 751 lock for black, generated via:
#   uv pip compile black --python-version 3.14.6 --universal --format pylock.toml
# Universal (multi-platform) resolution so the per-platform legs each select the
# right wheel: manylinux_2_28_x86_64 (linux/amd64, mypyc) + macosx_11_0_arm64
# (darwin/arm64, mypyc) + py3-none-any fallback (linux/arm64 — black ships no
# manylinux aarch64 wheel, so the pure wheel is selected there; black still
# runs, just not compiled). Plain `black` (no [d]/[jupyter]) → blackd not
# synthesized. requires-python relaxed from uv's ">=3.14.6" (uv#15995).
lock-version = "1.0"
created-by = "uv"
requires-python = ">=3.14"

