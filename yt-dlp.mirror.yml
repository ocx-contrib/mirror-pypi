# Mirror spec: yt-dlp — corpus app W3.3, migrated to the universal model
# (W4, plan_python_mirror_v2). Pure-python (py3-none-any), so the fully-static
# musl CPython (V1c) applies directly — no dlopen needed, wheel_priority is
# belt-and-suspenders. One platform leg proves both floors: debian:12 (glibc)
# and alpine:3.20 (musl) containers. Console-script entrypoint `yt-dlp =
# yt_dlp:main`.
name: yt-dlp
target:
  registry: dev.ocx.sh
  repository: ocx/yt-dlp

source:
  type: pylock
  path: yt-dlp.pylock.toml

python:
  version: "3.14.6"
  abi: cp314
  interpreter_package: "dev.ocx.sh/ocx/cpython-musl:3.14.6"

variants:
  - default: true
    libc: musl
    min_musllinux: "1_2"
    wheel_priority: ["any"]

tests:
  - name: smoke
    script: tests/yt-dlp.smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
    containers:
      - image: debian:12
      - image: alpine:3.20
