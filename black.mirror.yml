# Mirror spec: black — corpus app W3.3, migrated to the universal model (W4,
# plan_python_mirror_v2). black ships a compiled cp314 manylinux mypyc wheel,
# but the fully-static musl CPython (V1c) can't dlopen it — wheel_priority
# forces the py3-none-any fallback to win instead (trades away the mypyc
# speedup for one universal build). One platform leg proves both floors:
# debian:12 (glibc) and alpine:3.20 (musl) containers.
name: black
target:
  registry: dev.ocx.sh
  repository: ocx/black

source:
  type: pylock
  path: black.pylock.toml

python:
  version: "3.14.6"
  abi: cp314
  interpreter_package: "dev.ocx.sh/ocx/cpython-musl:3.14.6"

variants:
  - default: true
    libc: musl
    min_musllinux: "1_2"
    wheel_priority: ["any"]

tests:
  - name: smoke
    script: tests/black.smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
    containers:
      - image: debian:12
      - image: alpine:3.20
