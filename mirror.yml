# Mirror spec: pycowsay — first corpus app for the live pylock pipeline
# (W3.2). Pure-python (py3-none-any), no compiled extensions, so any cp3xx
# interpreter/ABI works; chosen interpreter matches the newest cpython
# cascade tag currently live on ocx.sh (3.14.6 / cp314).
name: pycowsay
target:
  registry: dev.ocx.sh
  repository: ocx/pycowsay

source:
  type: pylock
  path: pylock.toml

python:
  version: "3.14.6"
  abi: cp314
  interpreter_package: "ocx.sh/cpython:3.14.6"

variants:
  - default: true
    libc: gnu
    min_manylinux: "2_28"

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
